name: Feature request
description: Propose a new runtime, workflow, or AVM capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should AVM do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent Profile
        - Portable Memory
        - Runtime Adapter
        - CLI UX
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include relevant runtime config examples with secrets removed.
