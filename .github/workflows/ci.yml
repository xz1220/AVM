name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
      # Pin pnpm to the version declared in ui/package.json's
      # packageManager field. Recent pnpm releases (>=11.0.10) refuse
      # to run under corepack when the active corepack-default pnpm
      # version does not match packageManager, instead of silently
      # switching. Explicit `corepack prepare --activate` downloads
      # and activates the pinned version so the build stays
      # reproducible regardless of which pnpm shipped with the
      # runner's corepack.
      - name: Activate pinned pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate
      - run: go build ./...
      - run: go vet ./...
      - run: test -z "$(gofmt -l .)"
      - run: go test ./...
      - run: make build-ui
      - run: |
          set -eu
          home="$(mktemp -d)"
          AVM_INSTALL_SOURCE_DIR="$PWD" \
            AVM_INSTALL_UI=0 \
            AVM_INSTALL_DIR="$home/bin" \
            AVM_INSTALL_SHELL_INTEGRATION=0 \
            HOME="$home" \
            scripts/install.sh
          "$home/bin/avm" --version
          "$home/bin/avm" setup --no-capabilities
