version: "1"

active:
  kind: env
  name: coding

defaults:
  source_scope: global
  targets:
    - codex
    - claude-code
    - cline
    - cursor
  conflict_strategy: prompt

settings:
  backup_enabled: true
  backup_max_count: 10
  write_mode: managed-only
  shell_prompt:
    enabled: true
    format: "avm:%s"
