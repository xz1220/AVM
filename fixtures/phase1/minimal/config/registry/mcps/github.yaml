name: github
kind: mcp
description: GitHub MCP server fixture.
source: local
server:
  type: stdio
  command: npx
  args:
    - -y
    - "@modelcontextprotocol/server-github"
  env:
    GITHUB_TOKEN: "${GITHUB_TOKEN}"
  url: ""
  headers: {}
policy:
  enabled_tools: []
  disabled_tools: []
  default_approval: on-request
tags:
  - development
  - vcs
